<form>
    <div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-sm">
        <div class="card-body p-4">
            <div class="text-center mb-4">
            <i class="bi bi-envelope" style="color: var(--primary); font-size: 2.5rem;"></i>
            <h3 class="mt-2 fw-bold">Recuperación de Contraseña</h3>
            </div>      
            <p class="mt-5 text-center mb-0">
                Revisá tu email. Te enviamos un link para recuperar tu contraseña.
            </p>

            <p class="mt-3 text-center text-muted mb-0">
                Si no te llego, presiona el boton de abajo para reenviar el correo.
            </p>

            <p></p>

            <button type="button" class="btn btn-primary w-100" (click)="resendForgotPasswordEmail()">
                Reenviar correo de recuperación de contraseña
            </button>
        </div>
        </div>
    </div>
    </div>
</form>
