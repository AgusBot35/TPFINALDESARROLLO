<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-lock display-5" style="color: var(--primary)"></i>
          <h3 class="mt-2 fw-bold">Cambiar contraseña</h3>
          <p class="text-muted mb-0">Ingresá tu contraseña actual y tu nueva contraseña</p>
        </div>

        <app-toast></app-toast>
        <router-outlet></router-outlet>
        <form (ngSubmit)="submit()" #form="ngForm">
          <div class="mb-3">
            <label for="currentPassword" class="form-label fw-medium">Contraseña actual</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                id="currentPassword"
                type="password"
                class="form-control"
                [(ngModel)]="currentPassword"
                name="currentPassword"
                required
                placeholder="••••••••"
              />
            </div>
          </div>

          <div class="mb-4">
            <label for="newPassword" class="form-label fw-medium">Nueva contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input
                id="newPassword"
                type="password"
                class="form-control"
                [(ngModel)]="newPassword"
                name="newPassword"
                required
                placeholder="••••••••"
              />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100" [disabled]="form.invalid || loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-1" role="status"></span>
            }
            Guardar cambios
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
